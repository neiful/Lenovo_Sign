name: Lenovo Sign

on:
  schedule:
    - cron: '30 20 * * *'  # 北京时间 04:30 (第二天) / UTC 20:30
    - cron: '30 8 * * *'   # 北京时间 16:30 / UTC 08:30
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: 3.8

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run lenovo_sign.py
        env:
          GitHub_Actions: true
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          python lenovo_sign.py

      - name: Commit sign history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sign_history.txt
          git diff --staged --quiet || git commit -m "更新签到记录 $(date -u +'%Y-%m-%d')"
          git push
